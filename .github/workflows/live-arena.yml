name: live-arena

# Advances the LIVE arena on real Bitget data on a schedule and commits the growing,
# signed tournament so the public deploy's GET /live keeps ticking. Commits carry
# [skip ci] so they don't re-trigger the test workflow.

on:
  schedule:
    - cron: '23 */6 * * *'   # every 6 hours, off the :00 spike
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: live-arena
  cancel-in-progress: false

jobs:
  step:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python + venv
        run: uv venv --python 3.11
      - name: Install (api extras)
        run: uv pip install -e ".[api]"
      - name: Advance the live arena
        env:
          ARENA_SIGNING_KEY_B64: ${{ secrets.ARENA_SIGNING_KEY_B64 }}
        run: uv run python scripts/live_step.py --symbol BTCUSDT --instrument perp --state evidence/live
      - name: Commit the advanced state
        run: |
          git config user.name "live-arena-bot"
          git config user.email "noreply@github.com"
          git add evidence/live
          if git diff --cached --quiet; then
            echo "no new candles this run"
            exit 0
          fi
          git commit -m "live arena: advance to $(date -u +%FT%TZ) [skip ci]"
          git push
