name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python + venv
        run: uv venv --python 3.11
      - name: Install (dev + api + mcp + llm)
        run: uv pip install -e ".[dev,api,mcp,llm]"
      - name: Lint (ruff)
        run: uvx ruff check .
      - name: Run tests (offline)
        run: uv run pytest -q
      - name: Check doc numbers are consistent
        run: uv run python scripts/check_docs.py
