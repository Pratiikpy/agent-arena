// Agent Arena's published Ed25519 issuer key (config/issuer_pubkey.hex). The Verify tab pins
// against this, so a forger who self-signs with their own key is rejected — all in your browser.
const ISSUER_PUBKEY = "c2f8243b0d573587f285c830a868acd19249d17d59ecbf9329e796dfed6fb630";
const FLOAT_FIELDS = new Set(["effective_notional_usd"]);
const _hexBytes = (h) => { try { return Uint8Array.from(h.match(/../g).map(x => parseInt(x, 16))); } catch(e) { return null; } };
// Canonical bytes EXACTLY matching the server's signing form: sorted keys, no whitespace,
// Python float repr for monetary fields (50 -> "50.0"), ints bare.
function canonicalCertBytes(cert){
  const o = Object.assign({}, cert); delete o.signature_hex; delete o.public_key_hex;
  const body = Object.keys(o).sort().map(k => {
    const v = o[k]; let s;
    if (v === null) s = "null";
    else if (FLOAT_FIELDS.has(k) && typeof v === "number") s = Number.isInteger(v) ? v.toFixed(1) : String(v);
    else if (typeof v === "number") s = String(v);
    else s = JSON.stringify(v);
    return JSON.stringify(k) + ":" + s;
  }).join(",");
  return new TextEncoder().encode("{" + body + "}");
}
// Verify a certificate ENTIRELY in the browser (Web Crypto Ed25519) — no server, no network.
// Returns {valid, trusted_issuer} or null if this browser lacks Ed25519 (caller then falls back).
async function verifyCertLocally(cert){
  if (!(window.crypto && crypto.subtle)) return null;
  const pubHex = (cert.public_key_hex || "").toLowerCase();
  const pub = _hexBytes(pubHex), sig = _hexBytes(cert.signature_hex || "");
  if (!pub || !sig) return { valid:false, trusted_issuer:false };
  let key;
  try { key = await crypto.subtle.importKey("raw", pub, {name:"Ed25519"}, false, ["verify"]); }
  catch(e){ return null; }  // Ed25519 unsupported -> server fallback
  try {
    const valid = await crypto.subtle.verify({name:"Ed25519"}, key, sig, canonicalCertBytes(cert));
    return { valid, trusted_issuer: valid && pubHex === ISSUER_PUBKEY };
  } catch(e){ return null; }
}

// ---------- mock firewall (offline fallback, mirrors the live gate) ----------
function computeVerdict(requested, exposure, symbol, instrument){
  const headroom = Math.max(0, MAX_TOTAL - exposure);
  let decision, effective, reason;
  if(headroom <= 0){ decision="REJECT"; effective=null; reason="no headroom under sizing caps"; }
  else { const cap=Math.min(MAX_ORDER,headroom);
    if(requested<=cap){ decision="ALLOW"; effective=requested; reason="within all limits"; }
    else { decision="ALLOW_CAPPED"; effective=cap; reason="capped from "+fmt(requested)+" to "+fmt(cap); } }
  const orderState = requested<=MAX_ORDER ? "pass" : (decision==="REJECT"?"fail":"cap");
  const totalState = headroom<=0 ? "fail":"pass";
  const gates = [
    {name:"halt",state:"pass",detail:""},{name:"expiry",state:"pass",detail:""},
    {name:"universe",state:"pass",detail:symbol},{name:"instrument",state:"pass",detail:instrument},
    {name:"quote",state:"pass",detail:""},{name:"min_price",state:"pass",detail:""},
    {name:"daily_count",state:"pass",detail:"0 / 200"},{name:"leverage",state:"pass",detail:"1.0×"},
    {name:"max_order_notional",state:orderState,detail:fmt(MAX_ORDER)},
    {name:"max_total_exposure",state:totalState,detail:fmt(MAX_TOTAL)},
    {name:"max_leverage_exposure",state:"pass",detail:""},
  ];
  const seed = symbol+"|"+instrument+"|"+requested+"|"+exposure+"|"+Date.now();
  const cert = { issued_at:fmtTs(Date.now())+"Z", issuer:"98683e5cbe6313a0", nonce:hex(seed+"n",16),
    intent_hash:hex(seed,64), signature_hex:hex(seed+"sig",128),
    public_key_hex:"c2f8243b0d573587f285c830a868acd19249d17d59ecbf9329e796dfed6fb630" };
  return { decision, effective, reason, requested, gates, cert, valid:true, live:false };
}

// normalize a live /firewall response into the same shape the UI renders
function fromApi(d, requested){
  const gates = (d.gates||[]).map(g => {
    let st = g.passed ? "pass" : "fail";
    if(!g.passed && d.decision==="ALLOW_CAPPED" && /notional|exposure|leverage/.test(g.gate)) st="cap";
    let detail = g.detail || "";
    if(!detail && g.limit != null) detail = fmt(g.limit);
    return { name:g.gate, state:st, detail };
  });
  const c = d.certificate || {};
  return { decision:d.decision, reason:d.reason, effective:d.effective_notional_usd, requested,
    gates, cert:{ issued_at:c.issued_at, issuer:c.issuer, nonce:c.nonce, intent_hash:c.intent_hash,
      signature_hex:c.signature_hex, public_key_hex:c.public_key_hex },
    valid: d.certificate_valid !== false, live:true };
}

    for(var i=0;i<cases.length;i++){
      try{
        var r=await api("/firewall",{method:"POST",body:JSON.stringify(Object.assign({agent_id:"judge",symbol:"BTCUSDT",side:"buy",instrument:"perp",equity_usd:10000},cases[i].body))});
        steps.push({label:cases[i].label, decision:r.data.decision, reason:r.data.reason, eff:r.data.effective_notional_usd, cert:r.data.certificate});
      }catch(e){ steps.push({label:cases[i].label, decision:"ERR", reason:"server unreachable"}); }
      state.judge={running:true, steps:steps.slice()}; render();
    }
    var cert=null; for(var k=0;k<steps.length;k++){ if(steps[k].cert){ cert=steps[k].cert; break; } }
    var verified=null; if(cert){ try{ verified=await verifyCertLocally(cert); }catch(e){} }
    state.judge={running:false, steps:steps, verified:verified, cert:cert}; render();
  },
  setLedgerAgent(a){ state.ledgerAgent=a; state.openRow=-1; state.led=null; App.loadLed(); },
  async runVerify(){
    const el=document.getElementById("verifyInput"); const txt=el?el.value:(state.verifyInput||""); state.verifyInput=txt;
    let payload;
    try{ const d=JSON.parse(txt); payload=(d&&typeof d==="object"&&d.certificate)?d.certificate:d; }
    catch(e){ state.verifyResult={valid:false,reason:"not valid JSON"}; render(); return; }
    // Verify ENTIRELY in your browser (Web Crypto Ed25519) — the certificate is never sent anywhere.
    const local = await verifyCertLocally(payload);
    if(local){
      state.verifyResult = {
        valid: local.valid, trusted_issuer: local.trusted_issuer, method: "client-side",
        issuer: payload.issuer, decision: payload.decision, intent_hash: payload.intent_hash,
        reason: !local.valid ? "signature invalid or tampered"
              : local.trusted_issuer ? "signature valid and signed by Agent Arena's published key"
              : "signature self-consistent but NOT Agent Arena's published key (possible forgery)",
      };
      render(); return;
    }
    // Fallback only if this browser lacks Web Crypto Ed25519: ask the server to re-check.
    try{ const r=await api("/verify",{method:"POST",body:JSON.stringify(payload)}); state.verifyResult=Object.assign({method:"server"},r.data); }
    catch(e){ state.verifyResult={valid:null,reason:"verifier needs the API running (start it, or use scripts/verify_cert.py offline)"}; }
    render();
  },

  verifyPulse(){ if(!pulseData||!pulseData.certificate){ return; } state.verifyInput=JSON.stringify(pulseData.certificate,null,2); state.verifyResult=null; state.view="verify"; try{window.scrollTo(0,0);}catch(e){} render(); App.runVerify(); },
  tamperAndVerify(){

    let obj; try{ obj=JSON.parse(txt); }catch(e){ state.verifyResult={valid:null,reason:"load or paste a certificate first, then tamper a byte"}; render(); return; }
    const cert=(obj&&typeof obj==="object"&&obj.certificate)?obj.certificate:obj;
    if(!cert||!cert.signature_hex){ state.verifyResult={valid:null,reason:"no signature_hex to tamper — load a certificate first"}; render(); return; }
    const s=cert.signature_hex, i=Math.floor(s.length/2); cert.signature_hex=s.slice(0,i)+(s[i]==="a"?"b":"a")+s.slice(i+1);  // flip one hex char
    state.verifyInput=JSON.stringify(obj,null,2); state.verifyResult=null; render(); App.runVerify();  // real Web Crypto on the mutated cert -> invalid
  },
};

function spark(curve, up){
  if(!Array.isArray(curve)||curve.length<2) return '';
  const w=96,h=24,n=curve.length;
  const mn=Math.min.apply(null,curve), mx=Math.max.apply(null,curve), rng=(mx-mn)||1;
  const y=v=>(h-((v-mn)/rng)*(h-3)-1.5).toFixed(1);
  const pts=curve.map((v,i)=>((i/(n-1))*w).toFixed(1)+','+y(v)).join(' ');
  const col=up?'#0b7a4b':'#c23b30', base=y(curve[0]);
  return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" style="display:block;margin-top:5px;overflow:visible;" aria-hidden="true">'
    +'<line x1="0" y1="'+base+'" x2="'+w+'" y2="'+base+'" stroke="rgba(0,0,0,.10)" stroke-width="1" stroke-dasharray="2 2"/>'
    +'<polyline class="spark-line" points="'+pts+'" fill="none" stroke="'+col+'" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>'
    +'<circle cx="'+w+'" cy="'+y(curve[n-1])+'" r="2" fill="'+col+'"/></svg>';
}

  var stat=[[tested,"tested"],[rej,"rejected"],[grad,"graduated to capital"]].map(function(s){ return '<div style="border:1px solid rgba(0,0,0,.09);border-radius:12px;padding:16px 20px;"><div class="mono" style="font-size:24px;font-weight:700;color:#0a0a0a;">'+s[0]+'</div><div style="font-size:12px;color:#6b7280;margin-top:4px;">'+s[1]+'</div></div>'; }).join("");
  var body = dk.length ? dk.map(card).join("") : '<div style="color:#9aa0aa;">loading…</div>';
  return '<div style="max-width:1100px;margin:0 auto;padding:56px 40px 80px;"><div style="font-size:12px;font-weight:600;letter-spacing:.2em;color:#6b7280;margin-bottom:12px;">SKILL VS LUCK</div><h1 style="margin:0 0 10px;font-size:clamp(2rem,4vw,2.9rem);font-weight:700;letter-spacing:-.028em;color:#1d1d1f;">Overfit Court</h1><p style="margin:0 0 22px;font-size:15px;color:#6b7280;max-width:720px;">A leaderboard ranks by outcome. The Court rules on trust: every agent runs the same ladder of overfit and robustness checks, and a lucky backtest is labelled as luck before capital moves. Most candidates are rejected. That is the point.</p>'
    +'<div style="display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap;">'+stat+'</div>'
    +(signed?'<div style="margin-bottom:22px;">'+signed+'</div>':'<div style="height:12px;"></div>')
    +body+'</div>';
}
function passport(){
  var d=state.passports, ps=(d&&d.passports)||[];
  var GC={A:"#0b7a4b",B:"#0b7a4b",C:"#946200",D:"#c23b30"};
  function bar(label,v){ v=Math.max(0,Math.min(1,v||0)); return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;"><span style="font-size:10.5px;color:#9aa0aa;min-width:96px;">'+label+'</span><div style="flex:1;height:6px;background:#f1f1f2;border-radius:3px;overflow:hidden;"><div style="width:'+(v*100).toFixed(0)+'%;height:100%;background:#0a0a0a;"></div></div><span class="mono" style="font-size:11px;color:#6b7280;min-width:30px;text-align:right;">'+(v*100).toFixed(0)+'</span></div>'; }
  function metric(k,val){ return '<div><div style="font-size:10px;color:#9aa0aa;letter-spacing:.08em;">'+k+'</div><div class="mono" style="font-size:13px;color:#1d1d1f;">'+val+'</div></div>'; }
  function card(p){
    var c=p.components||{}, m=p.metrics||{}, lim=p.limits||{}, g=GC[p.grade]||"#6b7280";
    return '<div style="border:1px solid rgba(0,0,0,.09);border-radius:16px;padding:22px 24px;background:#fff;margin-bottom:16px;">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;gap:16px;">'
        +'<div><div style="font-size:16px;font-weight:700;color:#1d1d1f;">'+p.rank+'. '+esc(p.name)+'</div><div style="font-size:13px;color:#6b7280;">'+esc(p.philosophy)+'</div></div>'
        +'<div style="text-align:right;"><div class="mono" style="font-size:26px;font-weight:700;color:'+g+';line-height:1;">'+(p.trust_score!=null?(p.trust_score*100).toFixed(0):"—")+'</div><div style="font-size:10px;color:#9aa0aa;letter-spacing:.12em;white-space:nowrap;">TRUST · GRADE '+esc(p.grade||"")+'</div></div>'
      +'</div>'
      +'<div style="margin-bottom:14px;">'+bar("skill",c.skill)+bar("safety",c.safety)+bar("performance",c.performance)+bar("explainability",c.explainability)+'</div>'
      +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:12px;">'+metric("DSR",m.dsr!=null?Number(m.dsr).toFixed(2):"—")+metric("SHARPE",m.sharpe!=null?Number(m.sharpe).toFixed(3):"—")+metric("RETURN",m.total_return!=null?(m.total_return*100).toFixed(1)+"%":"—")+metric("MAX DD",m.max_drawdown!=null?(m.max_drawdown*100).toFixed(1)+"%":"—")+'</div>'
      +'<div class="mono" style="font-size:11.5px;color:#6b7280;border-top:1px solid rgba(0,0,0,.06);padding-top:10px;">max order $'+(lim.max_order_usd!=null?Number(lim.max_order_usd).toLocaleString():"—")+' · capital '+(p.capital_allocation!=null?(p.capital_allocation*100).toFixed(1)+"%":"—")+(p.restraint?' · restraint '+(p.restraint.restraint_score*100).toFixed(0):'')+' · '+esc(p.red_team||"")+'</div>'
    +'</div>';
  }
  var body = ps.length ? ps.map(card).join("") : '<div style="color:#9aa0aa;">loading…</div>';
  return '<div style="max-width:1180px;margin:0 auto;padding:56px 40px 80px;"><div style="font-size:12px;font-weight:600;letter-spacing:.2em;color:#6b7280;margin-bottom:12px;">CAPITAL-WORTHINESS</div><h1 style="margin:0 0 10px;font-size:clamp(2rem,4vw,2.9rem);font-weight:700;letter-spacing:-.028em;color:#1d1d1f;">Agent Passport</h1><p style="margin:0 0 36px;font-size:15px;color:#6b7280;max-width:700px;">The credit score for an autonomous trading agent. Trust Score = 40% skill (overfit-corrected) + 30% safety + 20% performance + 10% explainability. PnL ranks agents by outcome; this ranks them by whether they deserve capital.</p>'+body+'</div>';
}
function lab(){
  var d=state.lab||{}, G="#0b7a4b", R="#c23b30";
  function card(t,b){ return '<div style="border:1px solid rgba(0,0,0,.09);border-radius:16px;padding:24px;background:#fff;margin-bottom:18px;"><div style="font-size:10.5px;font-weight:600;letter-spacing:.16em;color:#9aa0aa;margin-bottom:14px;">'+t+'</div>'+b+'</div>'; }
  var pers="—";
  if(d.personas&&d.personas.personas&&d.personas.personas.length){ pers=d.personas.personas.map(function(p){ return '<div style="display:flex;gap:12px;margin-bottom:7px;align-items:baseline;"><span class="mono" style="min-width:160px;font-size:13px;color:#1d1d1f;font-weight:600;">'+esc(p.name)+'</span><span style="font-size:13px;color:#6b7280;">'+esc(p.philosophy)+'</span></div>'; }).join(""); }
  var br="—";
  if(d.brains&&d.brains.brains&&d.brains.brains.length){ br=d.brains.brains.map(function(b){ return '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(0,0,0,.05);"><span class="mono" style="font-size:13px;color:#1d1d1f;">'+b.rank+'. '+esc(b.name)+'</span><span class="mono" style="font-size:13px;color:'+(b.total_return>=0?G:R)+';">'+(b.total_return>=0?"+":"")+(b.total_return*100).toFixed(1)+'%</span></div>'; }).join(""); }
  var st="—";
  if(d.strategy&&d.strategy.code){ var s=d.strategy, bt=s.backtest||{}; st='<div style="font-size:13px;color:#6b7280;margin-bottom:10px;">"'+esc(s.brief||"")+'"</div><pre class="mono" style="background:#0a0a0a;color:#eafff4;padding:16px;border-radius:10px;overflow:auto;font-size:12px;line-height:1.5;margin:0;">'+esc(s.code)+'</pre><div class="mono" style="font-size:12px;color:#6b7280;margin-top:10px;">admitted '+(s.admitted?"✓":"✗")+' · trades '+(bt.trades!=null?bt.trades:"—")+' · sharpe '+(bt.sharpe!=null?bt.sharpe:"—")+' · sandboxed + backtest-gated</div>'; }
  var rf="—";
  if(d.reflection&&d.reflection.decisions){ var rs=(d.reflection.decisions||[]).filter(function(x){return x.reflection;}).slice(-4); rf='<div class="mono" style="font-size:12px;color:#6b7280;margin-bottom:10px;">hit rate '+(d.reflection.hit_rate!=null?Math.round(d.reflection.hit_rate*100):0)+'% over '+(d.reflection.resolved||0)+' graded calls</div>'+rs.map(function(x){ return '<div style="font-size:13px;color:#1d1d1f;margin-bottom:5px;">• '+esc(x.reflection)+'</div>'; }).join(""); }
  var db="—";
  if(d.debate&&d.debate.debate&&d.debate.debate.transcript){ var dd=d.debate.debate; db=dd.transcript.map(function(t){ return '<div style="margin-bottom:9px;"><span class="mono" style="font-size:10.5px;color:#9aa0aa;letter-spacing:.1em;text-transform:uppercase;">'+esc(t.role)+'</span><div style="font-size:13px;color:#1d1d1f;line-height:1.45;">'+esc(t.text)+'</div></div>'; }).join("")+'<div class="mono" style="font-size:12px;color:'+G+';margin-top:6px;">stance '+esc(dd.stance)+' · conviction '+dd.conviction+' · Ed25519-signed ✓</div>'; }
  return '<div style="max-width:1180px;margin:0 auto;padding:56px 40px 80px;"><div style="font-size:12px;font-weight:600;letter-spacing:.2em;color:#6b7280;margin-bottom:12px;">THE LAB</div><h1 style="margin:0 0 10px;font-size:clamp(2rem,4vw,2.9rem);font-weight:700;letter-spacing:-.028em;color:#1d1d1f;">Innovations</h1><p style="margin:0 0 36px;font-size:15px;color:#6b7280;max-width:680px;">Built on top of the trust layer: identity, memory, debate, language-to-agent, a model arena, and real analyst briefs, each one signed or sandboxed.</p>'+card("AGENT PERSONAS",pers)+card("MULTI-BRAIN MODEL ARENA",br)+card("NATURAL LANGUAGE TO A SANDBOXED AGENT",st)+card("REFLECTION MEMORY",rf)+card("SIGNED DEBATE TRANSCRIPT",db)+card("HOW IT COMPARES",'<div style="overflow:auto;"><table style="width:100%;border-collapse:collapse;font-size:12.5px;min-width:540px;"><tr style="color:#9aa0aa;text-align:left;"><th style="padding:6px 8px;font-weight:600;">project</th><th>signed firewall</th><th>DSR/PBO</th><th>allocator</th><th>browser-verify</th></tr><tr style="border-top:1px solid rgba(0,0,0,.06);color:#6b7280;"><td style="padding:6px 8px;">TradingAgents (87k stars)</td><td>no</td><td>no</td><td>no</td><td>no</td></tr><tr style="border-top:1px solid rgba(0,0,0,.06);color:#6b7280;"><td style="padding:6px 8px;">AI Hedge Fund (60k stars)</td><td>no</td><td>no</td><td>no</td><td>no</td></tr><tr style="border-top:1px solid rgba(0,0,0,.06);color:#6b7280;"><td style="padding:6px 8px;">AI-Trader</td><td>no</td><td>no</td><td>social</td><td>no</td></tr><tr style="border-top:1px solid rgba(0,0,0,.06);font-weight:700;color:#0a0a0a;"><td style="padding:6px 8px;">Agent Arena</td><td>yes</td><td>yes</td><td>yes</td><td>yes</td></tr></table></div><div style="font-size:12px;color:#6b7280;margin-top:10px;">These projects prove agentic trading is real. Agent Arena adds the missing trust layer.</div>')+'</div>';
}
function view(){ switch(state.view){ case "firewall":return firewall(); case "arena":return arena(); case "allocator":return allocatorView(); case "ledger":return ledger(); case "debate":return debate(); case "lab":return lab(); case "passport":return passport(); case "court":return court(); case "judge":return judge(); case "verify":return verifyView(); default:return landing(); } }
function render(){ $("app").innerHTML = nav() + view() + footer(); document.querySelectorAll("#app input:not([name])").forEach((el,i)=>{ el.name = "field" + i; }); }

// ---------- live pulse: a continuously-updating signed firewall heartbeat ----------
let pulseData = null, pulseAt = 0, pulseFail = 0;
function pulseEl(){
  let el = $("pulse");
  if(!el){
    el = document.createElement("div"); el.id = "pulse";
    el.style.cssText = "position:fixed;right:16px;bottom:16px;z-index:50;background:#0a0a0a;color:#fff;border-radius:12px;padding:10px 14px;font-family:'JetBrains Mono',monospace;font-size:11.5px;line-height:1.55;box-shadow:0 4px 20px rgba(0,0,0,.22);max-width:300px;cursor:pointer;";
    el.title = "Live signed firewall heartbeat — GET /pulse. Each verdict is freshly Ed25519-signed. Click to verify this live verdict in your browser.";
    el.onclick = () => { try { App.verifyPulse(); } catch (e) {} };
    document.body.appendChild(el);
  }
  return el;
}
function renderPulse(){
  const el = pulseEl();
  if(!pulseData){ el.innerHTML = '<span style="color:#9aa0aa;">○ connecting to live firewall…</span>'; return; }
  const d = pulseData, ago = Math.max(0, Math.round((Date.now()-pulseAt)/1000));
  const live = d.data_source === "bitget-live";
  const dot = pulseFail ? "#c23b30" : "#34d399";
  const dec = d.verdict ? d.verdict.decision : "—";
  const vc = dec === "REJECT" ? "#f2bdb7" : "#86efac";
  const px = d.quote && d.quote.mid ? ("$" + Number(d.quote.mid).toLocaleString("en-US",{maximumFractionDigits:2})) : "—";
  el.innerHTML =
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">'+
      '<span style="width:8px;height:8px;border-radius:50%;background:'+dot+';box-shadow:0 0 8px '+dot+';display:inline-block;"></span>'+
      '<b style="letter-spacing:.06em;">LIVE FIREWALL</b>'+
      '<span style="color:#9aa0aa;margin-left:auto;">'+(live?"bitget":"synthetic")+'</span>'+
    '</div>'+
    '<div style="color:#cbd0d8;">BTC '+px+' · <span style="color:'+vc+';font-weight:600;">'+esc(dec)+'</span></div>'+
    (d.regime && d.regime !== "NORMAL"
      ? '<div style="color:'+(d.kill_switch_armed?"#f2bdb7":"#f0d699")+';margin-top:2px;">'+(d.kill_switch_armed?"⛔ KILL-SWITCH":"⚠ "+esc(d.regime))+'</div>'
      : '')+
    '<div style="color:#7a8089;margin-top:2px;">signed '+ago+'s ago · issuer '+esc((d.issuer||"").slice(0,8))+'</div>'+
    '<div style="color:#86efac;margin-top:4px;font-weight:600;">↗ click to verify in your browser</div>';
}
async function pulseTick(){
  try{ const r = await fetch(API + "/pulse"); if(!r.ok) throw 0;
    pulseData = await r.json(); pulseAt = Date.now(); pulseFail = 0;
  }catch(e){ pulseFail++; }
  renderPulse();
}
function initPulse(){ pulseTick(); setInterval(pulseTick, 12000); setInterval(renderPulse, 1000); }

render();
checkHealth();
initPulse();
// landing hero stats: pull the real tournament once so the numbers always match the deploy
api("/leaderboard").then(r=>{ if(r&&r.ok&&r.data){ state.hero=r.data; render(); } }).catch(()=>{});
