// Agent Arena's published Ed25519 issuer key (config/issuer_pubkey.hex). The Verify tab pins
// against this, so a forger who self-signs with their own key is rejected — all in your browser.
const ISSUER_PUBKEY = "c2f8243b0d573587f285c830a868acd19249d17d59ecbf9329e796dfed6fb630";
const FLOAT_FIELDS = new Set(["effective_notional_usd"]);
const _hexBytes = (h) => { try { return Uint8Array.from(h.match(/../g).map(x => parseInt(x, 16))); } catch(e) { return null; } };
// Canonical bytes EXACTLY matching the server's signing form: sorted keys, no whitespace,
// Python float repr for monetary fields (50 -> "50.0"), ints bare.
function canonicalCertBytes(cert){
  const o = Object.assign({}, cert); delete o.signature_hex; delete o.public_key_hex;
  const body = Object.keys(o).sort().map(k => {
    const v = o[k]; let s;
    if (v === null) s = "null";
    else if (FLOAT_FIELDS.has(k) && typeof v === "number") s = Number.isInteger(v) ? v.toFixed(1) : String(v);
    else if (typeof v === "number") s = String(v);
    else s = JSON.stringify(v);
    return JSON.stringify(k) + ":" + s;
  }).join(",");
  return new TextEncoder().encode("{" + body + "}");
}
// Verify a certificate ENTIRELY in the browser (Web Crypto Ed25519) — no server, no network.
// Returns {valid, trusted_issuer} or null if this browser lacks Ed25519 (caller then falls back).
async function verifyCertLocally(cert){
  if (!(window.crypto && crypto.subtle)) return null;
  const pubHex = (cert.public_key_hex || "").toLowerCase();
  const pub = _hexBytes(pubHex), sig = _hexBytes(cert.signature_hex || "");
  if (!pub || !sig) return { valid:false, trusted_issuer:false };
  let key;
  try { key = await crypto.subtle.importKey("raw", pub, {name:"Ed25519"}, false, ["verify"]); }
  catch(e){ return null; }  // Ed25519 unsupported -> server fallback
  try {
    const valid = await crypto.subtle.verify({name:"Ed25519"}, key, sig, canonicalCertBytes(cert));
    return { valid, trusted_issuer: valid && pubHex === ISSUER_PUBKEY };
  } catch(e){ return null; }
}

// ---------- helpers ----------
const fmt = (n) => n == null ? "—" : "$" + Number(n).toLocaleString("en-US", {minimumFractionDigits:2, maximumFractionDigits:2});
const fmtTs = (ms) => new Date(ms).toISOString().replace("T"," ").slice(0,19);
const trunc = (s) => !s ? "" : (s.length > 18 ? s.slice(0,8)+"…"+s.slice(-6) : s);
const esc = (s) => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
function hex(seed, len){ let out=""; for(let k=0; out.length<len; k++){ let x=(2166136261^k)>>>0; const s=seed+"|"+k; for(let i=0;i<s.length;i++){x^=s.charCodeAt(i);x=Math.imul(x,16777619)>>>0;} out+=("00000000"+x.toString(16)).slice(-8);} return out.slice(0,len); }

function seg(active){ const b="flex:1;border:none;border-radius:8px;padding:8px 0;font-family:'JetBrains Mono',monospace;font-size:12px;cursor:pointer;transition:all .15s;letter-spacing:.01em;"; return active? b+"background:#fff;color:#0a0a0a;font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.14);" : b+"background:transparent;color:#8a909a;"; }

function navStyle(active){ return "font-size:11.5px;font-weight:"+(active?"600":"500")+";letter-spacing:.14em;color:"+(active?"#0a0a0a":"#9aa0aa")+";cursor:pointer;background:none;border:none;font-family:inherit;padding:0;transition:color .15s;"; }

// ---------- API (with mock fallback) ----------
async function api(path, opts){
  const r = await fetch(API + path, Object.assign({headers:{"content-type":"application/json"}}, opts));
  if(!r.ok && r.status !== 400) throw new Error("http "+r.status);
  return { ok:r.ok, status:r.status, data: await r.json() };
}
async function checkHealth(){ try{ const r=await api("/health"); state.online = !!r.ok; }catch(e){ state.online=false; } render(); }

// ---------- mock firewall (offline fallback, mirrors the live gate) ----------
function computeVerdict(requested, exposure, symbol, instrument){
  const headroom = Math.max(0, MAX_TOTAL - exposure);
  let decision, effective, reason;
  if(headroom <= 0){ decision="REJECT"; effective=null; reason="no headroom under sizing caps"; }
  else { const cap=Math.min(MAX_ORDER,headroom);
    if(requested<=cap){ decision="ALLOW"; effective=requested; reason="within all limits"; }
    else { decision="ALLOW_CAPPED"; effective=cap; reason="capped from "+fmt(requested)+" to "+fmt(cap); } }
  const orderState = requested<=MAX_ORDER ? "pass" : (decision==="REJECT"?"fail":"cap");
  const totalState = headroom<=0 ? "fail":"pass";
  const gates = [
    {name:"halt",state:"pass",detail:""},{name:"expiry",state:"pass",detail:""},
    {name:"universe",state:"pass",detail:symbol},{name:"instrument",state:"pass",detail:instrument},
    {name:"quote",state:"pass",detail:""},{name:"min_price",state:"pass",detail:""},
    {name:"daily_count",state:"pass",detail:"0 / 200"},{name:"leverage",state:"pass",detail:"1.0×"},
    {name:"max_order_notional",state:orderState,detail:fmt(MAX_ORDER)},
    {name:"max_total_exposure",state:totalState,detail:fmt(MAX_TOTAL)},
    {name:"max_leverage_exposure",state:"pass",detail:""},
  ];
  const seed = symbol+"|"+instrument+"|"+requested+"|"+exposure+"|"+Date.now();
  const cert = { issued_at:fmtTs(Date.now())+"Z", issuer:"98683e5cbe6313a0", nonce:hex(seed+"n",16),
    intent_hash:hex(seed,64), signature_hex:hex(seed+"sig",128),
    public_key_hex:"c2f8243b0d573587f285c830a868acd19249d17d59ecbf9329e796dfed6fb630" };
  return { decision, effective, reason, requested, gates, cert, valid:true, live:false };
}

// normalize a live /firewall response into the same shape the UI renders
function fromApi(d, requested){
  const gates = (d.gates||[]).map(g => {
    let st = g.passed ? "pass" : "fail";
    if(!g.passed && d.decision==="ALLOW_CAPPED" && /notional|exposure|leverage/.test(g.gate)) st="cap";
    let detail = g.detail || "";
    if(!detail && g.limit != null) detail = fmt(g.limit);
    return { name:g.gate, state:st, detail };
  });
  const c = d.certificate || {};
  return { decision:d.decision, reason:d.reason, effective:d.effective_notional_usd, requested,
    gates, cert:{ issued_at:c.issued_at, issuer:c.issuer, nonce:c.nonce, intent_hash:c.intent_hash,
      signature_hex:c.signature_hex, public_key_hex:c.public_key_hex },
    valid: d.certificate_valid !== false, live:true };
}

function genLedger(agent){
  const base = {swarm:7,"persona-team":13,"rl-qlearn":23}[agent]||7;
  let bal=10000, prev="0".repeat(64); const rows=[];
  for(let i=0;i<8;i++){ const side=(i*base)%2===0?"buy":"sell";
    const price=+(63500+((i*base*97)%1300)).toFixed(2);
    const qty=+(((i*base*13)%900+140)/100000).toFixed(8);
    const notional=+(price*qty).toFixed(2); const fee=+(notional*0.0006).toFixed(2);
    const change=+(((side==="buy"?1:-1)*(((i*base*7)%150)-64))/10-fee).toFixed(2);
    bal=+(bal+change).toFixed(2); const rh=hex(agent+i+"rh",64);
    rows.push({ts:1781784600000+i*60000,symbol:"BTC/USDT",side,price,quantity:qty,notional_usd:notional,fee_usd:fee,balance_after_usd:bal,
      decision:notional>2000?"ALLOW_CAPPED":"ALLOW",cert_hash:hex(agent+i+"c",64),prev_hash:prev,record_hash:rh,
      signature_hex:hex(agent+i+"s",128),public_key_hex:"c2f8243b0d573587f285c830a868acd19249d17d59ecbf9329e796dfed6fb630"});
    prev=rh; }
  return {agent, records:rows};
}

// ---------- actions ----------
const App = {
  go(v){ state.view=v; try{window.scrollTo(0,0);}catch(e){} if(v==="arena")App.loadLb(); if(v==="ledger")App.loadLed(); if(v==="debate")App.loadDeb(); render(); },
  set(k,v){ state[k]=v; },
  setSeg(k,v){ state[k]=v; render(); },
  setSize(v){ state[state.sizeMode==="notional"?"notional":"quantity"]=v; },
  copy(label,value){ try{navigator.clipboard&&navigator.clipboard.writeText(value);}catch(e){} state.copied=label; render(); clearTimeout(App._ct); App._ct=setTimeout(()=>{state.copied=null;render();},1300); },
  toggleTamper(){ state.tampered=!state.tampered; state.copied=null; render(); },
  toggleRow(i){ state.openRow = state.openRow===i?-1:i; render(); },

  async submit(){
    const requested = state.sizeMode==="notional" ? (Number(state.notional)||0) : (Number(state.quantity)||0)*PRICE;
    if(requested<=0){ state.phase="error"; state.result={error:"neither notional_usd nor quantity provided"}; render(); return; }
    state.phase="submitting"; state.tampered=false; state.copied=null; render();
    let r=null;
    try{
      const resp = await api("/firewall",{method:"POST",body:JSON.stringify({agent_id:"web-ui",symbol:state.symbol,side:state.side,instrument:state.instrument,notional_usd:state.sizeMode==="notional"?Number(state.notional):null,quantity:state.sizeMode==="quantity"?Number(state.quantity):null,equity_usd:Number(state.equity)||0,current_exposure_usd:Number(state.exposure)||0})});
      if(resp.status===400){ state.phase="error"; state.result={error:(resp.data&&resp.data.detail)||"invalid intent"}; render(); return; }
      r = fromApi(resp.data, requested);
    }catch(e){ r = computeVerdict(requested, Number(state.exposure)||0, state.symbol, state.instrument); }
    state.result=r; state.phase="result"; render();
  },
  preset(kind){ const m={allow:{notional:50,exposure:0},cap:{notional:999999,exposure:0},reject:{notional:5000,exposure:50000}}[kind];
    state.sizeMode="notional"; state.notional=m.notional; state.exposure=m.exposure; App.submit(); },
  async miniSubmit(){
    const requested=Number(state.mNotional)||0; if(requested<=0) return;
    try{ const resp=await api("/firewall",{method:"POST",body:JSON.stringify({agent_id:"web-ui",symbol:state.mSymbol,side:state.mSide,instrument:"spot",notional_usd:requested,equity_usd:10000,current_exposure_usd:0})});
      state.mResult = resp.status===400 ? {decision:"REJECT",reason:(resp.data&&resp.data.detail)||"invalid"} : {decision:resp.data.decision,reason:resp.data.reason};
    }catch(e){ const v=computeVerdict(requested,0,state.mSymbol,"spot"); state.mResult={decision:v.decision,reason:v.reason}; }
    render();
  },
  async loadLb(){
    if(state.lb) return;
    try{ const r=await api("/live"); if(r.ok&&r.data&&r.data.leaderboard&&r.data.leaderboard.length){ state.lb=r.data; state.lbIsLive=true; render(); return; } }catch(e){ /* no live arena yet -> batch */ }
    try{ const r=await api("/leaderboard"); state.lb=r.ok?r.data:mockLeaderboard(); }catch(e){ state.lb=mockLeaderboard(); }
    state.lbIsLive=false; render();
  },
  async loadLed(){ try{ const r=await api("/ledger?agent="+encodeURIComponent(state.ledgerAgent)+"&limit=10"); state.led=r.ok?r.data:genLedger(state.ledgerAgent); }catch(e){ state.led=genLedger(state.ledgerAgent); } render(); },
  async loadDeb(){ if(state.deb) return; try{ const r=await api("/debate"); state.deb=r.ok?r.data:mockDebate(); }catch(e){ state.deb=mockDebate(); } render(); },
  setLedgerAgent(a){ state.ledgerAgent=a; state.openRow=-1; state.led=null; App.loadLed(); },
  async runVerify(){
    const el=document.getElementById("verifyInput"); const txt=el?el.value:(state.verifyInput||""); state.verifyInput=txt;
    let payload;
    try{ const d=JSON.parse(txt); payload=(d&&typeof d==="object"&&d.certificate)?d.certificate:d; }
    catch(e){ state.verifyResult={valid:false,reason:"not valid JSON"}; render(); return; }
    // Verify ENTIRELY in your browser (Web Crypto Ed25519) — the certificate is never sent anywhere.
    const local = await verifyCertLocally(payload);
    if(local){
      state.verifyResult = {
        valid: local.valid, trusted_issuer: local.trusted_issuer, method: "client-side",
        issuer: payload.issuer, decision: payload.decision, intent_hash: payload.intent_hash,
        reason: !local.valid ? "signature invalid or tampered"
              : local.trusted_issuer ? "signature valid and signed by Agent Arena's published key"
              : "signature self-consistent but NOT Agent Arena's published key (possible forgery)",
      };
      render(); return;
    }
    // Fallback only if this browser lacks Web Crypto Ed25519: ask the server to re-check.
    try{ const r=await api("/verify",{method:"POST",body:JSON.stringify(payload)}); state.verifyResult=Object.assign({method:"server"},r.data); }
    catch(e){ state.verifyResult={valid:null,reason:"verifier needs the API running (start it, or use scripts/verify_cert.py offline)"}; }
    render();
  },
  loadLastCert(){ if(state.result&&state.result.cert){ state.verifyInput=JSON.stringify(state.result.cert,null,2); state.verifyResult=null; } else { state.verifyResult={valid:null,reason:"run a firewall check first to get a certificate"}; } render(); },

// ---------- result view model ----------
function buildResult(r){
  const C = VC[r.decision] || VC.ALLOW;

  const hashRow = (label, full) => { const cp=state.copied===label; return '<div onclick="App.copy(\''+label+'\',\''+(full||"")+'\')" style="cursor:pointer;display:flex;flex-direction:column;gap:3px;"><span class="mono" style="font-size:10px;letter-spacing:.1em;color:#9aa0aa;">'+label+'</span><span class="mono" style="display:flex;align-items:center;gap:8px;font-size:11.5px;color:#1d1d1f;">'+esc(trunc(full))+'<span style="font-size:10px;color:'+(cp?"#0b7a4b":"#b3b8c0")+';">'+(cp?"copied ✓":"copy")+'</span></span></div>'; };
  const gatesHtml = r.gates.map(g=>'<div style="display:flex;align-items:center;gap:11px;"><span class="mono" style="font-size:13px;color:'+GATE_COLOR[g.state]+';width:14px;text-align:center;">'+GATE_GLYPH[g.state]+'</span><span class="mono" style="font-size:12.5px;color:#1d1d1f;flex:1;">'+esc(g.name)+'</span><span class="mono" style="font-size:11px;color:#9aa0aa;">'+esc(g.detail||"")+'</span></div>').join("");
  const meta = [["decision",r.decision],["effective",fmt(r.effective)],["issued_at",cert.issued_at],["issuer",trunc(cert.issuer)],["nonce",cert.nonce]]
    .map(m=>'<span class="mono" style="font-size:11px;color:#9aa0aa;">'+m[0]+'</span><span class="mono" style="font-size:11.5px;color:#1d1d1f;text-align:right;">'+esc(m[1]||"")+'</span>').join("");
  const hashes = [hashRow("intent_hash",shownIntent),hashRow("signature_hex",cert.signature_hex),hashRow("public_key_hex",cert.public_key_hex)].join("");
  const certLine = valid?"#cdebd9":"#f2bdb7", certFaint=valid?"#b6e6cb":"#f2bdb7";
  const badge = valid ? {t:"✓ signature valid",bg:"#effaf3",fg:"#0b7a4b",ln:"#b6e6cb"} : {t:"✗ tampered",bg:"#fdf1f0",fg:"#c23b30",ln:"#f2bdb7"};
  const capped = r.decision==="ALLOW_CAPPED";
  return '\
  <div data-stamp style="display:flex;align-items:center;gap:20px;padding:24px 26px;border-radius:18px;border:1px solid '+C.line+';background:'+C.bg+';">\
    <div class="mono" style="font-weight:600;font-size:26px;color:'+C.fg+';white-space:nowrap;">'+r.decision+'</div>\
    <div style="width:1px;align-self:stretch;background:'+C.line+';"></div>\
    <div style="flex:1;font-size:15px;color:#1d1d1f;line-height:1.45;">'+esc(r.reason)+'</div>\
